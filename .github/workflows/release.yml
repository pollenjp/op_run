name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    environment:
      name: release
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      # Generating a GitHub token, so that PRs and tags created by
      # the release-please-action can trigger actions workflows.
      - name: Generate GitHub token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        id: generate-token
        with:
          app-id: ${{ secrets.RELEASE_PLEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ steps.generate-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  upload-assets:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build platform tarballs
        run: |
          set -euo pipefail
          tag="${{ needs.release-please.outputs.tag_name }}"
          mkdir -p dist staging
          cp op_run staging/op_run
          chmod +x staging/op_run

          # op_run is a portable bash script; ship identical archives per
          # platform so mise's GitHub backend autodetection picks them up.
          for target in linux-x64 linux-arm64 linux-x86 macos-x64 macos-arm64; do
            archive="dist/op_run-${tag}-${target}.tar.gz"
            tar -czf "${archive}" -C staging op_run
            (cd dist && sha256sum "$(basename "${archive}")") >> dist/SHA256SUMS
          done

          ls -la dist

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${{ needs.release-please.outputs.tag_name }}"
          gh release upload "${tag}" dist/op_run-*.tar.gz dist/SHA256SUMS \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber
